<svg width="1000" height="220" viewBox="0 0 1000 220" xmlns="http://www.w3.org/2000/svg">
  <rect width="1000" height="220" rx="14" fill="#050807"/>
  <rect x="10" y="10" width="980" height="200" rx="12" fill="none" stroke="#00ff41"/>

  <text x="40" y="45" fill="#00ff41" font-family="monospace" font-size="24">
    project_dashboard
  </text>

  <text x="40" y="85" fill="#d6ffd6" font-family="monospace" font-size="18">SnapSort-Termux</text>
  <rect x="300" y="72" width="360" height="16" fill="#092b13"/>
  <rect x="300" y="72" width="0" height="16" fill="#00ff41">
    <animate attributeName="width" values="0;360" dur="2s" repeatCount="indefinite"/>
  </rect>
  <text x="690" y="85" fill="#00ff41" font-family="monospace" font-size="18">100%</text>

  <text x="40" y="125" fill="#d6ffd6" font-family="monospace" font-size="18">WireGuard-Pi-5</text>
  <rect x="300" y="112" width="360" height="16" fill="#092b13"/>
  <rect x="300" y="112" width="0" height="16" fill="#00ff41">
    <animate attributeName="width" values="0;360" dur="2.4s" repeatCount="indefinite"/>
  </rect>
  <text x="690" y="125" fill="#00ff41" font-family="monospace" font-size="18">100%</text>

  <text x="40" y="165" fill="#d6ffd6" font-family="monospace" font-size="18">Next Project</text>
  <rect x="300" y="152" width="360" height="16" fill="#092b13"/>
  <rect x="300" y="152" width="0" height="16" fill="#00ff41">
    <animate attributeName="width" values="0;126" dur="2.8s" repeatCount="indefinite"/>
  </rect>
  <text x="690" y="165" fill="#00ff41" font-family="monospace" font-size="18">35%</text>

  <circle cx="900" cy="60" r="7" fill="#00ff41">
    <animate attributeName="opacity" values="1;.2;1" dur="1s" repeatCount="indefinite"/>
  </circle>
</svg>
